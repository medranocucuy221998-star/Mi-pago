<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel de Pago Seguro | Zeus</title>
    <style>
        /* CONFIGURACIÓN DEL FONDO CON LA NUEVA IMAGEN */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Roboto, sans-serif;
            
            /* COLOR DE RESPALDO OSCURO */
            background-color: #06090f;
            
            /* USAMOS EL NOMBRE EXACTO DE TU IMAGEN SUBIDA: zeus.jpg */
            background-image: url('zeus.jpg');
            
            /* AJUSTES PARA QUE SE VEA PERFECTA EN MÓVILES */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* CAPA OSCURA PARA ASEGURAR EL CONTRASTE DEL TEXTO */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65); /* Filtro negro al 65% de opacidad */
            z-index: 1;
        }

        /* CONTENEDOR PRINCIPAL DEL FORMULARIO */
        .container {
            position: relative;
            z-index: 10;
            background-color: rgba(15, 18, 26, 0.95); /* Fondo oscuro semitransparente */
            padding: 25px;
            border-radius: 20px;
            width: 320px;
            border: 1px solid rgba(0, 82, 255, 0.3); /* Borde azul sutil */
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
            backdrop-filter: blur(5px); /* Efecto de desenfoque de fondo */
        }

        h2 {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #fff;
        }

        /* TARJETA VISUAL PREMIUM */
        .card-visual {
            background: linear-gradient(135deg, #0f172a 0%, #001030 100%);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
        }
