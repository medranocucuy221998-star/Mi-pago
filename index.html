<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agregar Tarjeta | Zeus22998</title>
    <style>
        /* --- CONSERVAMOS TU FONDO DE GOKU --- */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #06090f;
            /* SE RECOMIENDA USAR LA IMAGEN goku.jpg PARA UN FONDO IDÉNTICO */
            background-image: url('goku.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* CAPA OSCURA SOBRE LA IMAGEN */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65); 
            z-index: 1;
        }

        /* --- CONSERVAMOS TU CONTENEDOR PRINCIPAL --- */
        .container {
            position: relative;
            z-index: 10;
            background-color: rgba(15, 18, 26, 0.95);
            padding: 25px;
            border-radius: 20px;
            width: 320px;
            border: 1px solid rgba(0, 82, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
            backdrop-filter: blur(5px);
        }

        h2 {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #fff;
        }

        /* --- CONSERVAMOS TU TARJETA VISUAL PREMIUM (Zeus22998) --- */
        .card-visual {
            background: linear-gradient(135deg, #0f172a 0%, #001030 100%);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
        }

        .chip {
            width: 40px; height: 30px;
            background: linear-gradient(135deg, #ffd700, #b8860b);
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .card-number-display {
            font-size: 1.3rem;
            letter-spacing: 2px;
            color: #fff;
            font-family: monospace;
            margin-bottom: 8px;
        }

        .custom-text {
            font-size: 10px;
            color: #00f2ff; /* Azul neón para combinar con Goku */
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        /* --- ACTUALIZAMOS LAS ETIQUETAS (▶ NÚMERO DE TARJETA) --- */
        label {
            font-size: 11px;
            color: #ccc; /* Gris claro de Savage */
            text-transform: uppercase;
            display: block;
            margin-top: 15px;
            text-align: left;
            font-weight: bold;
            letter-spacing: 1px;
        }

        label::before {
            content: '▶ ';
            color: #ccc;
            font-size: 10px;
        }

        /* --- ACTUALIZAMOS LOS CAMPOS DE ENTRADA (ESTILO SAVAGE NEÓN) --- */
        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            background-color: transparent; /* Fondo transparente de Savage */
            border: 1px solid rgba(255, 255, 255, 0.1); /* Borde sutil de Savage */
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            font-family: 'Courier New', monospace; /* Tipografía Courier de Savage */
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3); /* Placeholder tenue */
        }

        input:focus {
            border-color: #00f2ff; /* Borde neón al enfocar */
            outline: none;
        }

        /* --- ACTUALIZAMOS FECHA VENCIMIENTO EN AZUL NEÓN IDÉNTICO --- */
        #expiry-input {
            border-color: #00f2ff; /* Borde neón permanente */
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.1);
        }

        /* --- ACTUALIZAMOS BOTÓN AGREGAR TARJETA (ESTILO RECTÁNGULO NEÓN) --- */
        button {
            width: 100%;
            padding: 18px;
            background-color: rgba(0, 82, 255, 0.05); /* Muy poco color de fondo */
            border: 1px solid #00f2ff; /* Borde neón de Savage */
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1.5px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
            transition: 0.3s;
        }

        button:active { transform: scale(0.98); }

        /* PANTALLA DE CARGA (MANTENIDA) */
        #loader { display: none; padding: 20px; }
        .timer-num { font-size: 50px; color: #00f2ff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div id="main-content">
            <h2>AGREGAR TARJETA</h2>

            <div class="card-visual">
                <div class="chip"></div>
                <div class="card-number-display">#### #### #### ####</div>
                <div class="custom-text">Zeus22998 pagos seguro</div>
            </div>
            
            <form id="payForm">
                <label>NÚMERO DE TARJETA</label>
                <input type="text" name="cc-number" autocomplete="cc-number" inputmode="numeric" placeholder="0000 0000 0000 0000" required>
                
                <label>FECHA DE VENCIMIENTO</label>
                <input type="text" name="cc-exp" id="expiry-input" autocomplete="cc-exp" placeholder="MM/AA" maxlength="5" required>

                <input type="hidden" name="cc-name" autocomplete="cc-name" value="Titular">

                <button type="submit">AGREGAR TARJETA</button>
            </form>
        </div>

        <div id="loader">
            <h3 style="color: #fff;">VERIFICANDO...</h3>
            <div class="timer-num" id="countdown">3</div>
        </div>
    </div>

<script>
    // ESTE SCRIPT MANEJA LA CUENTA REGRESIVA Y LA DETECCIÓN DE GUARDADO
    document.getElementById('payForm').onsubmit = function(e) {
        e.preventDefault(); // Evita el envío tradicional
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        let count = 3;
        const interval = setInterval(() => {
            count--;
            document.getElementById('countdown').innerText = count;
            if (count === 0) {
                clearInterval(interval);
                // ESTO DISPARA EL ALGORITMO DE GUARDADO DE CHROME
                window.location.reload(); 
            }
        }, 1000);
    };

    // Formateo automático de MM/AA (Opcional, pero recomendado para MM/AA)
    document.getElementById('expiry-input').addEventListener('input', function(e) {
        let input = e.target.value.replace(/\D/g, ''); // Elimina todo lo que no sea número
        if (input.length >= 2) {
            input = input.substring(0, 2) + '/' + input.substring(2, 4);
        }
        e.target.value = input;
    });
</script>

</body>
</html>
