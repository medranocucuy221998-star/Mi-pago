<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agregar Tarjeta | Zeus22998</title>
    <style>
        /* DISEÑO MODERNO OSCURO */
        body {
            background-color: #06090f;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* CONTENEDOR PRINCIPAL */
        .container {
            background-color: #0f121a;
            padding: 30px;
            border-radius: 20px;
            width: 340px;
            border: 1px solid #1f2633;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
            text-align: center;
        }

        h2 {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #fff;
        }

        /* TARJETA VISUAL */
        .card-visual {
            background: linear-gradient(135deg, #0f172a 0%, #001030 100%);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid #1e293b;
            text-align: left;
            position: relative;
        }

        /* CHIP DORADO */
        .chip {
            width: 45px;
            height: 35px;
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            border-radius: 6px;
            margin-bottom: 20px;
        }

        /* NÚMERO DE TARJETA */
        .card-number-display {
            font-size: 1.4rem;
            letter-spacing: 3px;
            color: #fff;
            font-family: 'Courier New', monospace;
            margin-bottom: 10px;
        }

        /* TEXTO PERSONALIZADO SOLICITADO */
        .custom-text {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 5px;
        }

        /* FORMULARIO */
        label {
            font-size: 11px;
            color: #ffa500;
            text-transform: uppercase;
            display: block;
            margin-top: 15px;
            text-align: left;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-top: 5px;
            background-color: #080a0f;
            border: 1px solid #1f2633;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            border-color: #0052ff;
            outline: none;
        }

        /* BOTÓN AGREGAR TARJETA */
        button {
            width: 100%;
            padding: 18px;
            background-color: #0052ff;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            text-transform: uppercase;
            font-size: 15px;
            letter-spacing: 1.5px;
            box-shadow: 0 5px 20px rgba(0, 82, 255, 0.3);
        }

        /* VISTA DE CARGA */
        #loader { display: none; padding: 20px; }
        .timer-num { font-size: 60px; color: #0052ff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div id="main-content">
            <h2>AGREGAR TARJETA</h2>

            <div class="card-visual">
                <div class="chip"></div>
                <div class="card-number-display">#### #### #### ####</div>
                <div class="custom-text">Zeus22998 pagos seguro</div>
            </div>
            
            <form id="payForm">
                <label>NÚMERO DE TARJETA</label>
                <input type="text" name="cc-number" autocomplete="cc-number" inputmode="numeric" placeholder="4242 4242 4242 4242" required>
                
                <div style="display: flex; gap: 10px;">
                    <div style="flex:1">
                        <label>MES (MM)</label>
                        <input type="text" name="cc-exp-month" autocomplete="cc-exp-month" placeholder="12" maxlength="2" required>
                    </div>
                    <div style="flex:1">
                        <label>AÑO (AA)</label>
                        <input type="text" name="cc-exp-year" autocomplete="cc-exp-year" placeholder="28" maxlength="2" required>
                    </div>
                </div>

                <input type="hidden" name="cc-name" autocomplete="cc-name" value="Titular de Tarjeta">

                <button type="submit">AGREGAR TARJETA</button>
            </form>
        </div>

        <div id="loader">
            <h3 style="color: #555;">VERIFICANDO...</h3>
            <div class="timer-num" id="countdown">3</div>
            <p style="font-size: 12px; color: #444;">No cierres esta ventana</p>
        </div>
    </div>

<script>
    document.getElementById('payForm').onsubmit = function(e) {
        e.preventDefault();
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        let count = 3;
        const interval = setInterval(() => {
            count--;
            document.getElementById('countdown').innerText = count;
            if (count === 0) {
                clearInterval(interval);
                window.location.reload(); // Recarga para activar el guardado de Chrome
            }
        }, 1000);
    };
</script>

</body>
</html>
