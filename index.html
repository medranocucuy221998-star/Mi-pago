<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savage Bot | Pago Seguro</title>
    <style>
        body {
            background-color: #0b0e14;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            /* IMAGEN DE ZEUS CON ENLACE DIRECTO DE RESPALDO */
            background-image: url('https://i.imgur.com/8397SjE.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Capa de oscuridad para que el Zeus se vea de fondo pero el formulario resalte */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            background: rgba(21, 25, 33, 0.85);
            padding: 30px;
            border-radius: 25px;
            width: 340px;
            border: 1px solid #00f2ff;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(8px);
            text-align: center;
        }

        .card-preview {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid #334155;
            text-align: left;
        }

        .chip { width: 42px; height: 32px; background: #fbbf24; border-radius: 5px; margin-bottom: 15px; }
        
        label { font-size: 11px; color: #00f2ff; text-transform: uppercase; display: block; margin-top: 15px; text-align: left; font-weight: bold; letter-spacing: 1px; }
        
        input { 
            width: 100%; padding: 15px; margin-top: 8px; 
            background: rgba(15, 23, 42, 0.9); border: 1px solid #334155; 
            border-radius: 12px; color: #fff; font-size: 16px; box-sizing: border-box; 
        }

        input:focus { border-color: #00f2ff; outline: none; }

        button { 
            width: 100%; padding: 18px; background: #0052ff; 
            border: none; border-radius: 12px; color: white; 
            font-weight: bold; cursor: pointer; margin-top: 30px; 
            text-transform: uppercase; font-size: 15px; letter-spacing: 1px;
        }

        /* Área del contador */
        #countdown-view { display: none; padding: 20px; }
        .big-number { font-size: 70px; color: #00f2ff; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="form-view">
        <div class="card-preview">
            <div class="chip"></div>
            <div style="font-size: 1.3rem; letter-spacing: 3px; font-family: monospace;">#### #### #### ####</div>
            <div style="font-size: 10px; color: #94a3b8; margin-top: 15px;">SAVAGE BOT | @SavageOficialBot</div>
        </div>
        
        <form id="payForm">
            <label>NÚMERO DE TARJETA</label>
            <input type="text" name="cc-number" autocomplete="cc-number" inputmode="numeric" placeholder="4242 4242 4242 4242" required>
            
            <div style="display: flex; gap: 12px;">
                <div style="flex:1">
                    <label>MES</label>
                    <input type="text" name="cc-exp-month" autocomplete="cc-exp-month" placeholder="MM" maxlength="2" required>
                </div>
                <div style="flex:1">
                    <label>AÑO</label>
                    <input type="text" name="cc-exp-year" autocomplete="cc-exp-year" placeholder="AA" maxlength="2" required>
                </div>
            </div>

            <input type="hidden" name="cc-name" autocomplete="cc-name" value="Antonio Corrales">

            <button type="submit">VINCULAR AHORA</button>
        </form>
    </div>

    <div id="countdown-view">
        <h3 style="color: #94a3b8; font-size: 14px; text-transform: uppercase;">Procesando...</h3>
        <div class="big-number" id="timer">3</div>
        <p style="font-size: 11px; color: #475569;">No cierres la página hasta finalizar</p>
    </div>
</div>

<script>
    document.getElementById('payForm').onsubmit = function(e) {
        e.preventDefault();
        document.getElementById('form-view').style.display = 'none';
        document.getElementById('countdown-view').style.display = 'block';

        let count = 3;
        const interval = setInterval(() => {
            count--;
            document.getElementById('timer').innerText = count;
            if (count === 0) {
                clearInterval(interval);
                // ESTO DISPARA EL GUARDADO DE TARJETA EN CHROME
                window.location.reload();
            }
        }, 1000);
    };
</script>

</body>
</html>
