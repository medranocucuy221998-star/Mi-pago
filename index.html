<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Savage Panel | Zeus22998</title>
    <style>
        /* FONDO CONFIGURADO PARA hacker.jpg */
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #06090f;
            
            /* AQUÍ CAMBIAMOS EL NOMBRE A hacker.jpg */
            background-image: url('hacker.jpg');
            
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow-x: hidden;
        }

        /* CAPA DE CONTRASTE OSCURA */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1;
        }

        /* CONTENEDOR ESTILO CRISTAL */
        .container {
            position: relative;
            z-index: 10;
            background-color: rgba(15, 18, 26, 0.85); 
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 360px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-sizing: border-box;
        }

        /* TU TARJETA AZUL ZEUS22998 */
        .card-view {
            background: linear-gradient(135deg, #0f172a 0%, #001030 100%);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
        }

        .chip {
            width: 40px; height: 30px;
            background: linear-gradient(135deg, #ffd700, #b8860b);
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .card-number-display {
            font-size: 1.3rem;
            letter-spacing: 2px;
            color: #fff;
            font-family: monospace;
            margin-bottom: 8px;
        }

        .custom-text {
            font-size: 10px;
            color: #00f2ff;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* ETIQUETAS CON TRIÁNGULO ▶ */
        label {
            display: block;
            text-align: left;
            font-size: 11px;
            color: #ccc;
            margin-top: 15px;
            font-weight: bold;
            text-transform: uppercase;
        }

        label::before {
            content: '▶ ';
            font-size: 10px;
        }

        /* INPUTS TRANSPARENTES ESTILO SAVAGE */
        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            background-color: rgba(0, 0, 0, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        /* CAMPO FECHA CON BORDE NEÓN AZUL */
        #expiry-input {
            border-color: #00f2ff;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.1);
        }

        input:focus {
            border-color: #00f2ff;
            outline: none;
        }

        /* BOTÓN RECTANGULAR NEÓN */
        button {
            width: 100%;
            padding: 18px;
            background-color: rgba(0, 82, 255, 0.05);
            border: 1px solid #00f2ff;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1.5px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        button:active { transform: scale(0.98); }

        /* PANTALLA DE CARGA */
        #loader { display: none; padding: 20px; }
        .timer-num { font-size: 50px; color: #00f2ff; font-weight: bold; }
    </style>
</head>
<body>

        <div id="main-content">
            <h2 style="font-size: 16px; color: #fff; letter-spacing: 2px;">AGREGAR TARJETA</h2>

            <div class="card-view">
                <div class="chip"></div>
                <div class="card-number-display">#### #### #### ####</div>
                <div class="custom-text">Zeus22998 pagos seguro</div>
            </div>
            
            <form id="payForm">
                <label>NÚMERO DE TARJETA</label>
                <input type="text" name="cc-number" placeholder="0000 0000 0000 0000" required>
                
                <label>FECHA DE VENCIMIENTO</label>
                <input type="text" name="cc-exp" id="expiry-input" placeholder="MM/AA" maxlength="5" required>

                <input type="hidden" name="cc-name" value="Titular">
                <button type="submit">AGREGAR TARJETA</button>
            </form>
        </div>

        <div id="loader">
            <h3 style="color: #fff;">VERIFICANDO...</h3>
            <div class="timer-num" id="countdown">3</div>
        </div>
    </div>
