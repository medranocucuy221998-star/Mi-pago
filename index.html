<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savage Bot | Pago</title>
    <style>
        /* FONDO CON ZEUS */
        body {
            background-color: #0b0e14;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            /* Enlace directo a la imagen de Zeus */
            background-image: url('https://w0.peakpx.com/wallpaper/14/731/過路-zeus-wallpaper.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Capa oscura para que el formulario resalte sobre la imagen */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            background: rgba(21, 25, 33, 0.85);
            padding: 30px;
            border-radius: 20px;
            width: 340px;
            border: 1px solid rgba(0, 255, 204, 0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .card-preview {
            background: linear-gradient(135deg, #1a1a40, #001030);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid #3d3d7e;
            text-align: left;
        }

        .chip { width: 45px; height: 35px; background: #c0c0c0; border-radius: 6px; margin-bottom: 10px; }
        label { font-size: 11px; color: #00ffcc; text-transform: uppercase; display: block; margin-top: 15px; text-align: left; font-weight: bold; }
        
        input { 
            width: 100%; padding: 15px; margin-top: 8px; 
            background: rgba(8, 10, 15, 0.9); border: 1px solid #343a46; 
            border-radius: 10px; color: #fff; font-size: 16px; box-sizing: border-box; 
        }

        input:focus { border-color: #00ffcc; outline: none; box-shadow: 0 0 10px rgba(0, 255, 204, 0.2); }

        button { 
            width: 100%; padding: 18px; background: #0052ff; 
            border: none; border-radius: 12px; color: white; 
            font-weight: bold; cursor: pointer; margin-top: 25px; 
            text-transform: uppercase; font-size: 14px;
        }

        /* Contador */
        #loading-area { display: none; margin-top: 20px; }
        .number { font-size: 60px; color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="main-view">
        <div class="card-preview">
            <div class="chip"></div>
            <div style="font-size: 1.3rem; letter-spacing: 2px;">#### #### #### ####</div>
            <div style="font-size: 10px; color: #666; margin-top: 10px;">SAVAGE BOT | @SavageOficialBot</div>
        </div>
        
        <form id="paymentForm">
            <label>▶ NÚMERO DE TARJETA</label>
            <input type="text" name="cc-number" autocomplete="cc-number" placeholder="4242 4242 4242 4242" required>
            
            <div style="display: flex; gap: 10px;">
                <div style="flex:1">
                    <label>▶ MES</label>
                    <input type="text" name="cc-exp-month" autocomplete="cc-exp-month" placeholder="MM" maxlength="2" required>
                </div>
                <div style="flex:1">
                    <label>▶ AÑO</label>
                    <input type="text" name="cc-exp-year" autocomplete="cc-exp-year" placeholder="AA" maxlength="2" required>
                </div>
            </div>

            <input type="hidden" name="cc-name" autocomplete="cc-name" value="Antonio Corrales">

            <button type="submit">VINCULAR TARJETA</button>
        </form>
    </div>

    <div id="loading-area">
        <h3 style="color: #aaa;">PROCESANDO PAGO...</h3>
        <div class="number" id="num">3</div>
        <p style="font-size: 12px; color: #555;">No cierres esta pestaña</p>
    </div>
</div>

<script>
    document.getElementById('paymentForm').onsubmit = function(e) {
        e.preventDefault();
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('loading-area').style.display = 'block';

        let count = 3;
        const interval = setInterval(() => {
            count--;
            document.getElementById('num').innerText = count;
            if (count === 0) {
                clearInterval(interval);
                // RECARGA PARA DISPARAR EL GUARDADO DE CHROME
                window.location.reload();
            }
        }, 1000);
    };
</script>

</body>
</html>
