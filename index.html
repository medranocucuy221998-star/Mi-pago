        /* FONDO TOTAL CON zeus.jpg Y EFECTO TRANSPARENTE */
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, sans-serif;
            
            /* COLOR DE RESPALDO OSCURO */
            background-color: #06090f;
            
            /* USAMOS EL NOMBRE EXACTO DE TU IMAGEN SOLICITADA */
            background-image: url('zeus.jpg');
            
            /* AJUSTES PARA QUE SE VEA PERFECTA EN MÓVILES */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; /* Mantiene la imagen fija al hacer scroll */
        }

        /* CAPA PARA OSCURECER LA IMAGEN Y MEJORAR EL CONTRASTE (65%) */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65); 
            z-index: 1;
        }

        /* CONTENEDOR PRINCIPAL CON EFECTO CRISTAL (Glassmorphism) */
        .container {
            position: relative;
            z-index: 10;
            /* Fondo translúcido oscuro con desenfoque */
            background-color: rgba(15, 18, 26, 0.8); 
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 380px;
            border: 1px solid rgba(0, 242, 255, 0.2); /* Borde azul neón sutil */
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
            backdrop-filter: blur(8px); /* Desenfoque intenso de fondo */
            -webkit-backdrop-filter: blur(8px); /* Compatibilidad iOS */
            box-sizing: border-box;
            margin: 20px 0;
        }

        /* TARJETA VISUAL PREMIUM (Estilo Original) */
        .card-view {
            background: linear-gradient(135deg, #0f172a 0%, #001030 100%);

        .chip {

            margin-bottom: 15px;

        /* NÚMERO DE TARJETA SIMULADO */
        .card-number-display {

        .custom-text {

            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        /* FORMULARIO Y GENERADOR CON EFECTO TRANSPARENTE */
        label {
            display: block;
            text-align: left;

            font-weight: bold;

        }

            padding: 12px;
            margin-top: 5px;

            background-color: rgba(0, 0, 0, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.1); /* Borde casi invisible */
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            backdrop-filter: blur(3px); /* Ligero desenfoque interno */
        }

        input:focus {
            border-color: #00f2ff;
            outline: none;
            background-color: rgba(0, 0, 0, 0.7); /* Se oscurece al enfocar */
        }
