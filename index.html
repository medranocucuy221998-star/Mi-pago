<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Google Pay Card Adder | Zeus2298</title>
    <style>
        /* FONDO GENERAL */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background-color: #000;
            background-image: url('prueva.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1;
        }

        /* CONTENEDOR PRINCIPAL */
        .main-container {
            position: relative;
            z-index: 10;
            background-color: rgba(15, 18, 26, 0.98);
            border-radius: 20px;
            width: 90%;
            max-width: 360px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
            text-align: center;
            backdrop-filter: blur(8px);
            box-sizing: border-box;
        }

        /* TARJETA CON FONDO CUBO.GIF */
        .card-view {
            background-image: url('cubo.gif');
            background-size: cover;
            background-position: center;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .card-view::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        .chip {
            width: 45px;
            height: 32px;
            background: linear-gradient(135deg, #ffd700, #b8860b);
            border-radius: 5px;
            margin-bottom: 25px;
            position: relative;
            z-index: 2;
        }

        .card-number-display {
            font-size: 1.25rem;
            letter-spacing: 3px;
            color: white;
            font-family: monospace;
            margin-bottom: 15px;
            position: relative;
            z-index: 2;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .card-text {
            font-size: 11px;
            color: white;
            line-height: 1.5;
            font-weight: bold;
            text-transform: uppercase;
            position: relative;
            z-index: 2;
        }

        /* FORMULARIO */
        label {
            display: block;
            text-align: left;
            font-size: 11px;
            color: #ccc;
            margin-top: 20px;
            font-weight: bold;
            letter-spacing: 1.2px;
        }

        label::before {
            content: '▶ ';
            font-size: 10px;
        }

        input {
            width: 100%;
            padding: 14px 12px;
            margin-top: 5px;
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        #expiry-input, #card-number-input {
            border-color: #00f2ff;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.1);
        }

        button {
            width: 100%;
            padding: 18px;
            background-color: transparent;
            border: 1px solid #00f2ff;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1.5px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        /* ESTADO CARGANDO */
        #loader { display: none; padding: 20px; }
        .timer-num { font-size: 60px; color: #00f2ff; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="main-container">
        <div id="main-content">
            <h2 style="color: white; font-size: 15px; letter-spacing: 2px; margin-bottom: 20px;">GOOGLE PAY CARD ADDER</h2>
            
            <div class="card-view">
                <div class="chip"></div>
                <div id="visual-card-number" class="card-number-display">#### #### #### ####</div>
                
                <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                    <div class="card-text">
                        ZEUS2298<br>
                        PAGOS SEGURO
                    </div>
                    <div class="card-text" style="text-align: right; font-size: 10px;">
                        EXP.<br>
                        MM/AA
                    </div>
                </div>
            </div>
            
            <form id="payForm">
                <input type="hidden" name="cc-name" autocomplete="cc-name" value="Titular">

                <label>NÚMERO DE TARJETA</label>
                <input type="text" id="card-number-input" name="cc-number" autocomplete="cc-number" inputmode="numeric" placeholder="0000 0000 0000 0000" maxlength="19" required>
                
                <label>FECHA DE VENCIMIENTO</label>
                <input type="text" name="cc-exp" id="expiry-input" autocomplete="cc-exp" inputmode="numeric" placeholder="MM/AA" maxlength="5" required>

                <button type="submit">AGREGAR TARJETA</button>
            </form>
        </div>

        <div id="loader">
            <h3 style="color: #fff; letter-spacing: 2px;">VERIFICANDO...</h3>
            <div class="timer-num" id="countdown">3</div>
        </div>
    </div>

<script>
    const payForm = document.getElementById('payForm');
    const cardNumberInput = document.getElementById('card-number-input');
    const expiryInput = document.getElementById('expiry-input');
    const visualCardNumber = document.getElementById('visual-card-number');

    // Formateo de número visual
    cardNumberInput.addEventListener('input', function(e) {
        let value = e.target.value.replace(/\D/g, '');
        let formatted = value.match(/.{1,4}/g)?.join(' ') || '';
        e.target.value = formatted;
        visualCardNumber.innerText = formatted || "#### #### #### ####";
    });

    // Formateo de fecha MM/AA
    expiryInput.addEventListener('input', function(e) {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length > 0) {
            if (value.length === 1 && value > 1) value = '0' + value;
            if (value.length >= 2) value = value.substring(0, 2) + '/' + value.substring(2, 4);
        }
        e.target.value = value;
    });

    // Borrar barra
    expiryInput.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace' && this.value.length === 3) this.value = this.value.substring(0, 2);
    });

    // FUNCIÓN DE ENVÍO CON CUENTA REGRESIVA 3, 2, 1
    payForm.addEventListener('submit', function(e) {
        e.preventDefault(); // Detenemos el envío inmediato para mostrar la animación
        
        // Cambiar vista al cargador
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        
        let count = 3;
        const countdownElement = document.getElementById('countdown');
        
        const interval = setInterval(() => {
            count--;
            if (count > 0) {
                countdownElement.innerText = count;
            } else {
                clearInterval(interval);
                // Al llegar a 0, recarga la página
                window.location.reload();
            }
        }, 1000);
    });
</script>
</body>
</html>
